services:
  postgres:
    image: postgres:15
    container_name: crawler-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - crawler-net

  redis:
    image: redis:7-alpine
    container_name: crawler-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - crawler-net

  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: temporal
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-platform}
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crawler-net

  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: temporal-ui
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_UI_PORT: 8080
      TEMPORAL_CORS_ORIGINS: http://localhost:8233
    ports:
      - "8233:8080"
    depends_on:
      temporal:
        condition: service_started
    networks:
      - crawler-net

  temporal-orchestrator:
    build:
      context: ./temporal_orchestrator
    container_name: temporal-orchestrator
    restart: unless-stopped
    environment:
      AIRFLOW_BASE_URL: http://airflow-webserver:8080
      AIRFLOW_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      AIRFLOW_DAG_ID: crawler_csv_to_postgres
      TEMPORAL_SERVER: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: crawler-task-queue
    ports:
      - "8090:8090"
    depends_on:
      temporal:
        condition: service_started
      airflow-webserver:
        condition: service_started
    networks:
      - crawler-net

  airflow-init:
    build:
      context: ./pipeline
    container_name: airflow-init
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-airflow}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-airflow}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-airflow_local_shared_secret_key_change_in_prod}
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth
      AIRFLOW_UID: "50000"
      PYTHONPATH: /opt/airflow/src:/opt/platform
      WAREHOUSE_DSN: postgresql+psycopg2://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/analytics
      RAW_CSV_PATH: /opt/platform/data/raw/books_raw.csv
      PROCESSED_CSV_PATH: /opt/platform/data/processed/books_clean.csv
      OUTPUT_FILE: /opt/platform/data/raw/books_raw.csv
      CRAWLER_START_URLS: ${CRAWLER_START_URLS:-https://books.toscrape.com/}
      CRAWLER_KEYWORDS: ${CRAWLER_KEYWORDS:-}
      CRAWLER_MAX_PAGES: ${CRAWLER_MAX_PAGES:-10}
      CRAWLER_COMPARTMENT: ${CRAWLER_COMPARTMENT:-default}
      CRAWLER_SOURCE_CONFIG: ${CRAWLER_SOURCE_CONFIG:-/opt/platform/crawler/schemas/default_schema.yml}
      CRAWLER_SCHEMA_PATH: ${CRAWLER_SCHEMA_PATH:-/opt/platform/crawler/schemas/default_schema.yml}
    command:
      - bash
      - -c
      - |
        airflow db migrate && \
        (airflow users create \
          --username ${AIRFLOW_ADMIN_USERNAME:-admin} \
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} || true)
    volumes: &airflow-volumes
      - ./pipeline/dags:/opt/airflow/dags
      - ./pipeline/src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
      - ./crawler:/opt/platform/crawler
      - ./data:/opt/platform/data
      - ./db:/opt/platform/db
      - ./superset:/opt/platform/superset
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crawler-net

  airflow-webserver:
    build:
      context: ./pipeline
    container_name: airflow-webserver
    hostname: airflow-webserver
    command: webserver
    environment: *airflow-env
    ports:
      - "8080:8080"
    volumes: *airflow-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - crawler-net

  platform-bootstrap:
    image: python:3.11-slim
    container_name: platform-bootstrap
    command: ["python", "/opt/platform/scripts/bootstrap_airflow.py"]
    environment:
      AIRFLOW_BASE_URL: http://airflow-webserver:8080
      AIRFLOW_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      AIRFLOW_DAG_ID: crawler_csv_to_postgres
      AIRFLOW_BOOTSTRAP_ON_STARTUP: ${AIRFLOW_BOOTSTRAP_ON_STARTUP:-true}
      AIRFLOW_BOOTSTRAP_TIMEOUT_SECONDS: ${AIRFLOW_BOOTSTRAP_TIMEOUT_SECONDS:-300}
      CRAWLER_START_URLS: ${CRAWLER_START_URLS:-https://books.toscrape.com/}
      CRAWLER_KEYWORDS: ${CRAWLER_KEYWORDS:-}
      CRAWLER_MAX_PAGES: ${CRAWLER_MAX_PAGES:-2}
      CRAWLER_COMPARTMENT: ${CRAWLER_COMPARTMENT:-bootstrap}
      CRAWLER_SOURCE_CONFIG: ${CRAWLER_SOURCE_CONFIG:-/opt/platform/crawler/schemas/default_schema.yml}
      ORCHESTRATOR_BASE_URL: http://temporal-orchestrator:8090
    volumes:
      - ./scripts:/opt/platform/scripts:ro
    depends_on:
      temporal-orchestrator:
        condition: service_started
      airflow-webserver:
        condition: service_started
    networks:
      - crawler-net

  airflow-scheduler:
    build:
      context: ./pipeline
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    command: scheduler
    environment: *airflow-env
    volumes: *airflow-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - crawler-net

  airflow-worker:
    build:
      context: ./pipeline
    container_name: airflow-worker
    hostname: airflow-worker
    command: celery worker
    environment:
      <<: *airflow-env
      DUMB_INIT_SETSID: "0"
    volumes: *airflow-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - crawler-net

  airflow-triggerer:
    build:
      context: ./pipeline
    container_name: airflow-triggerer
    hostname: airflow-triggerer
    command: triggerer
    environment: *airflow-env
    volumes: *airflow-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - crawler-net

  crawler:
    build:
      context: ./crawler
    container_name: crawler-runner
    environment:
      CRAWLER_START_URLS: ${CRAWLER_START_URLS:-https://books.toscrape.com/}
      CRAWLER_KEYWORDS: ${CRAWLER_KEYWORDS:-}
      CRAWLER_MAX_PAGES: ${CRAWLER_MAX_PAGES:-10}
      CRAWLER_COMPARTMENT: ${CRAWLER_COMPARTMENT:-default}
      CRAWLER_SOURCE_CONFIG: ${CRAWLER_SOURCE_CONFIG:-/app/schemas/default_schema.yml}
      CRAWLER_SCHEMA_PATH: ${CRAWLER_SCHEMA_PATH:-/app/schemas/default_schema.yml}
      OUTPUT_FILE: /app/data/raw/books_raw.csv
    volumes:
      - ./crawler:/app
      - ./data:/app/data
      - ./pipeline:/app/pipeline
    command: ["python", "-m", "app.crawler"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crawler-net
    profiles: ["manual"]

  superset-init:
    image: apache/superset:3.1.2
    container_name: superset-init
    command:
      - /bin/sh
      - -c
      - |
        pip install --no-cache-dir psycopg2-binary && \
        superset db upgrade && \
        (superset fab create-admin \
          --username ${SUPERSET_ADMIN_USERNAME:-admin} \
          --firstname Superset \
          --lastname Admin \
          --email ${SUPERSET_ADMIN_EMAIL:-admin@example.com} \
          --password ${SUPERSET_ADMIN_PASSWORD:-admin} || true) && \
        superset init && \
        python /app/pythonpath/bootstrap_superset.py
    environment: &superset-env
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change_me_in_prod}
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/superset_metadata
    volumes:
      - superset_home:/app/superset_home
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./superset/bootstrap_superset.py:/app/pythonpath/bootstrap_superset.py:ro
      - ./superset:/opt/platform/superset
      - ./data:/opt/platform/data
    depends_on:
      postgres:
        condition: service_healthy
      airflow-webserver:
        condition: service_started
    networks:
      - crawler-net

  superset:
    image: apache/superset:3.1.2
    container_name: superset
    command:
      - /bin/sh
      - -c
      - |
        /usr/bin/run-server.sh
    environment: *superset-env
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./superset/bootstrap_superset.py:/app/pythonpath/bootstrap_superset.py:ro
      - ./superset:/opt/platform/superset
      - ./data:/opt/platform/data
    depends_on:
      superset-init:
        condition: service_completed_successfully
    networks:
      - crawler-net

  control-ui:
    build:
      context: ./ui_nicegui
    container_name: crawler-control-ui
    environment:
      AIRFLOW_DAG_ID: ${AIRFLOW_BOOTSTRAP_DAG_ID:-crawler_csv_to_postgres}
      AIRFLOW_BASE_URL: http://airflow-webserver:8080
      AIRFLOW_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      ORCHESTRATOR_BASE_URL: ${ORCHESTRATOR_BASE_URL:-http://temporal-orchestrator:8090}
      TEMPORAL_UI_URL: ${TEMPORAL_UI_URL:-http://localhost:8233}
      SUPERSET_DASHBOARD_URL: http://localhost:8088/superset/dashboard/crawler-analytics/
    ports:
      - "8501:8501"
    volumes:
      - ./ui_nicegui:/app
    depends_on:
      airflow-webserver:
        condition: service_started
      temporal-orchestrator:
        condition: service_started
      superset:
        condition: service_started
    networks:
      - crawler-net

  control-ui-legacy:
    build:
      context: ./ui
    container_name: crawler-control-ui-legacy
    environment:
      AIRFLOW_DAG_ID: ${AIRFLOW_BOOTSTRAP_DAG_ID:-crawler_csv_to_postgres}
      AIRFLOW_BASE_URL: http://airflow-webserver:8080
      AIRFLOW_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      SUPERSET_DASHBOARD_URL: http://localhost:8088/superset/dashboard/crawler-analytics/
    ports:
      - "8502:8501"
    volumes:
      - ./ui:/app
    depends_on:
      airflow-webserver:
        condition: service_started
      superset:
        condition: service_started
    networks:
      - crawler-net
    profiles: ["legacy-ui"]

volumes:
  postgres_data:
  redis_data:
  airflow_logs:
  superset_home:

networks:
  crawler-net:
    driver: bridge
