services:
  postgres:
    image: postgres:15
    container_name: crawler-postgres
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - crawler-net

  crawler:
    build:
      context: ./crawler
    container_name: crawler-runner
    environment:
      CRAWLER_START_URLS: ${CRAWLER_START_URLS:-https://books.toscrape.com/}
      CRAWLER_KEYWORDS: ${CRAWLER_KEYWORDS:-}
      CRAWLER_MAX_PAGES: ${CRAWLER_MAX_PAGES:-5}
      CRAWLER_COMPARTMENT: ${CRAWLER_COMPARTMENT:-default}
      OUTPUT_FILE: /app/data/raw/books_raw.csv
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "app.crawler"]
    networks:
      - crawler-net
    profiles: ["manual"]

  airflow-init:
    build:
      context: ./pipeline
    container_name: airflow-init
    hostname: airflow-init
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://platform:platform@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__SECRET_KEY: airflow_local_shared_secret_key_change_in_prod
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth
      AIRFLOW_UID: "50000"
      PYTHONPATH: /opt/airflow/src:/opt/platform
      WAREHOUSE_DSN: postgresql+psycopg2://platform:platform@postgres:5432/analytics
      RAW_CSV_PATH: /opt/platform/data/raw/books_raw.csv
      PROCESSED_CSV_PATH: /opt/platform/data/processed/books_clean.csv
      OUTPUT_FILE: /opt/platform/data/raw/books_raw.csv
      CRAWLER_START_URLS: ${CRAWLER_START_URLS:-https://books.toscrape.com/}
      CRAWLER_KEYWORDS: ${CRAWLER_KEYWORDS:-}
      CRAWLER_MAX_PAGES: ${CRAWLER_MAX_PAGES:-10}
      CRAWLER_COMPARTMENT: ${CRAWLER_COMPARTMENT:-default}
      AIRFLOW_BOOTSTRAP_ON_STARTUP: ${AIRFLOW_BOOTSTRAP_ON_STARTUP:-true}
      AIRFLOW_BOOTSTRAP_DAG_ID: ${AIRFLOW_BOOTSTRAP_DAG_ID:-crawler_csv_to_postgres}
    command:
      - bash
      - -c
      - |
        airflow db migrate && \
        (airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true) && \
        if [ "$${AIRFLOW_BOOTSTRAP_ON_STARTUP}" = "true" ]; then \
          EXISTING_RUNS=$(python -c "import os; from sqlalchemy import create_engine, text; dag_id=os.getenv('AIRFLOW_BOOTSTRAP_DAG_ID', 'crawler_csv_to_postgres'); engine=create_engine(os.environ['AIRFLOW__DATABASE__SQL_ALCHEMY_CONN']); conn=engine.connect(); print(conn.execute(text('SELECT COUNT(*) FROM dag_run WHERE dag_id = :dag_id'), {'dag_id': dag_id}).scalar_one()); conn.close()"); \
          if [ "$${EXISTING_RUNS}" = "0" ]; then \
            echo "Bootstrapping initial DAG run for $${AIRFLOW_BOOTSTRAP_DAG_ID}"; \
            airflow dags unpause "$${AIRFLOW_BOOTSTRAP_DAG_ID}" || true; \
            airflow dags trigger "$${AIRFLOW_BOOTSTRAP_DAG_ID}" --run-id "bootstrap__initial"; \
          else \
            echo "Skipping bootstrap trigger: $${EXISTING_RUNS} existing runs found for $${AIRFLOW_BOOTSTRAP_DAG_ID}"; \
          fi; \
        fi
    volumes: &airflow-volumes
      - ./pipeline/dags:/opt/airflow/dags
      - ./pipeline/src:/opt/airflow/src
      - ./crawler:/opt/platform/crawler
      - ./data:/opt/platform/data
      - ./db:/opt/platform/db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crawler-net

  airflow-webserver:
    build:
      context: ./pipeline
    container_name: airflow-webserver
    hostname: airflow-webserver
    command: webserver
    environment: *airflow-env
    ports:
      - "8080:8080"
    volumes: *airflow-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - crawler-net

  airflow-scheduler:
    build:
      context: ./pipeline
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    command: scheduler
    environment: *airflow-env
    volumes: *airflow-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - crawler-net

  airflow-triggerer:
    build:
      context: ./pipeline
    container_name: airflow-triggerer
    hostname: airflow-triggerer
    command: triggerer
    environment: *airflow-env
    volumes: *airflow-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - crawler-net

  superset-init:
    image: apache/superset:3.1.2
    container_name: superset-init
    command:
      - /bin/sh
      - -c
      - |
        pip install --no-cache-dir psycopg2-binary && \
        superset db upgrade && \
        (superset fab create-admin \
          --username admin \
          --firstname Superset \
          --lastname Admin \
          --email admin@example.com \
          --password admin || true) && \
        superset init && \
        python /app/pythonpath/bootstrap_superset.py
    environment: &superset-env
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: change_me_in_prod
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://platform:platform@postgres:5432/superset_metadata
    volumes:
      - superset_home:/app/superset_home
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./superset/bootstrap_superset.py:/app/pythonpath/bootstrap_superset.py:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crawler-net

  superset:
    image: apache/superset:3.1.2
    container_name: superset
    command:
      - /bin/sh
      - -c
      - |
        pip install --no-cache-dir psycopg2-binary && \
        /usr/bin/run-server.sh
    environment: *superset-env
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./superset/bootstrap_superset.py:/app/pythonpath/bootstrap_superset.py:ro
    depends_on:
      superset-init:
        condition: service_completed_successfully
    networks:
      - crawler-net

  control-ui:
    build:
      context: ./ui
    container_name: crawler-control-ui
    environment:
      AIRFLOW_BASE_URL: http://airflow-webserver:8080
      AIRFLOW_USERNAME: admin
      AIRFLOW_PASSWORD: admin
      AIRFLOW_DAG_ID: crawler_csv_to_postgres
      SUPERSET_DASHBOARD_URL: http://localhost:8088/superset/dashboard/crawler-analytics/
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "8501:8501"
    depends_on:
      airflow-webserver:
        condition: service_started
      airflow-scheduler:
        condition: service_started
      airflow-triggerer:
        condition: service_started
      superset:
        condition: service_started
    networks:
      - crawler-net

volumes:
  postgres_data:
  superset_home:

networks:
  crawler-net:
    driver: bridge
